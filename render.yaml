services:
  # Backend API
  - type: web
    name: logistics-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: logistics-redis
          property: connectionString
      - key: PORT
        value: 10000
    
  # PostgreSQL Database
  - type: pserv
    name: logistics-db
    env: docker
    plan: free
    image: postgis/postgis:15-3.3
    disk:
      name: logistics-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_USER
        value: logistics_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: logistics_db
  
  # Redis Cache
  - type: redis
    name: logistics-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Frontend (Static Site)
  - type: web
    name: logistics-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: logistics-api
          property: host
