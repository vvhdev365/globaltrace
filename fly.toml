# fly.toml app configuration file
# Documentation: https://fly.io/docs/reference/configuration/

app = "globaltrace"
primary_region = "ord"  # Chicago - change to closest region

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
